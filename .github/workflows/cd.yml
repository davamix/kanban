name: CD

# Release-driven: build, scan, and PUBLISH the container image to GHCR. Runs on version tags
# (and manual dispatch) rather than on every push. The Trivy scan is a hard gate *before*
# publish, so only a clean image is pushed. The actual deploy step is still deferred (no target).
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/davamix/kanban

jobs:
  # Release gate. CD is triggered by tags, and CI does NOT run on tag pushes — so without this a
  # release could publish a build that fails the tests or carries a known-vulnerable dependency.
  # Re-runs the CI correctness/security gates here; the publish job `needs` it, so a red gate
  # stops the workflow before anything is pushed.
  verify:
    name: Verify (tests + dependency audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Kanban.slnx

      - name: Build
        run: dotnet build Kanban.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Kanban.slnx -c Release --no-build

      # Hard gate: refuse to publish on any known-vulnerable NuGet package.
      - name: Audit NuGet packages for known vulnerabilities
        run: |
          report=$(dotnet list Kanban.slnx package --vulnerable --include-transitive)
          echo "$report"
          if echo "$report" | grep -q "following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected — refusing to publish"
            exit 1
          fi

  image:
    name: Build, scan & publish image
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to the Security tab
      packages: write          # push the image to GHCR
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      # Build once and load locally so Trivy scans the EXACT image before it is published.
      - name: Build image (load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: kanban:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Hard gate: fail on fixable HIGH/CRITICAL vulns or secrets baked into the image.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: kanban:${{ github.sha }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          # Apply the severity filter to the SARIF too, so exit-code only fires on
          # HIGH/CRITICAL (otherwise the action reports — and gates on — all severities).
          limit-severities-for-sarif: true
          format: sarif
          output: trivy-image.sarif
          exit-code: '1'

      - name: Upload image scan to code scanning
        if: always()   # publish even when the scan step fails the job
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # The steps below run only if the scan above passed — a failed gate fails the job and
      # skips them, so an image with HIGH/CRITICAL findings is never pushed.
      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Re-runs the build with push: true; the buildx cache from the scan build is reused, so
      # this pushes layers without a full rebuild.
      - name: Publish to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---------------------------------------------------------------------
      # Deploy (deferred): no target yet. When ready, add a job that pulls the
      # published image into the ecosystem-platform stack (compose pull) or the
      # eventual deploy target.
      # ---------------------------------------------------------------------
